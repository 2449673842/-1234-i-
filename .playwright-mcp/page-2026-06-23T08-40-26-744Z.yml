", \"y\": 36, \"Color\": \"#1F78B4\", \"PointSize\": 24.747474707552108 }, { \"ID\": 39, \"Site\": \"NJ\", \"样本名\": \"mean.NJ\", \"LNRR\": 0.9280647745066047, \"LNRR_SE_proxy\": 0.3918443388066054, \"LNRR_CI_low\": 0.1600498704456581, \"LNRR_CI_high\": 1.696079678567551, \"Weight_proxy\": 6.51287655576998, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 37, \"Color\": \"#1F78B4\", \"PointSize\": 26.36180807946968 }, { \"ID\": 3, \"Site\": \"SQ\", \"样本名\": \"mean.SQ\", \"LNRR\": 1.080996272963314, \"LNRR_SE_proxy\": 0.4061425532319884, \"LNRR_CI_low\": 0.2849568686286167, \"LNRR_CI_high\": 1.877035677298011, \"Weight_proxy\": 6.062377981782364, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 38, \"Color\": \"#1F78B4\", \"PointSize\": 26.171387577996803 }, { \"ID\": 37, \"Site\": \"XC\", \"样本名\": \"mean.XC\", \"LNRR\": 1.249903840618026, \"LNRR_SE_proxy\": 0.9195092156458025, \"LNRR_CI_low\": -0.5523342220477467, \"LNRR_CI_high\": 3.052141903283799, \"Weight_proxy\": 1.182736031261238, \"CI_class\": \"CI-crosses-zero\", \"Response_Group\": \"Promoted\", \"y\": 39, \"Color\": \"#1F78B4\", \"PointSize\": 24.108819745646993 }, { \"ID\": 21, \"Site\": \"YC2\", \"样本名\": \"mean.YC2\", \"LNRR\": 1.465845426698962, \"LNRR_SE_proxy\": 0.1918626652677393, \"LNRR_CI_low\": 1.089794602774193, \"LNRR_CI_high\": 1.841896250623731, \"Weight_proxy\": 27.16558448597672, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 40, \"Color\": \"#1F78B4\", \"PointSize\": 35.09146723473023 }, { \"ID\": 25, \"Site\": \"SY\", \"样本名\": \"mean.SY\", \"LNRR\": 1.769516855120657, \"LNRR_SE_proxy\": 0.486313671595109, \"LNRR_CI_low\": 0.8163420587942435, \"LNRR_CI_high\": 2.722691651447071, \"Weight_proxy\": 4.228312160226079, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 41, \"Color\": \"#1F78B4\", \"PointSize\": 25.396149311682976 } ] import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt import numpy as np import pandas as pd from scipy.stats import chi2 # 常量 PROMOTION = \"#1F78B4\" INHIBITION = \"#D62728\" CI_COLOR = \"#8F8B85\" ZERO_COLOR = \"#333333\" # 加载数据 df = pd.DataFrame(_uploaded_data) # 确保数值列正确 num_cols = [\"LNRR\", \"LNRR_CI_low\", \"LNRR_CI_high\", \"LNRR_SE_proxy\", \"Weight_proxy\"] for col in num_cols: df[col] = pd.to_numeric(df[col], errors=\"coerce\") df = df.dropna(subset=[\"Site\"] + num_cols).copy() # 按 LnRR 排序并重新编号 y df = df.sort_values(\"LNRR\", ascending=True).reset_index(drop=True) df[\"y\"] = np.arange(len(df)) # 颜色（根据 LNRR 符号） df[\"Color\"] = np.where(df[\"LNRR\"] >= 0, PROMOTION, INHIBITION) # 点大小（基于 Weight_proxy 重新计算） weight = df[\"Weight_proxy\"].fillna(df[\"Weight_proxy\"].median()) min_w, max_w = weight.min(), weight.max() if max_w - min_w > 1e-12: df[\"PointSize\"] = 24 + 82 * (weight - min_w) / (max_w - min_w) else: df[\"PointSize\"] = 48 # ----------------- 异质性指标（随机效应 DL 法） ----------------- effects = df[\"LNRR\"].values se = df[\"LNRR_SE_proxy\"].values var = se ** 2 w_fixed = 1.0 / var weighted_mean_fixed = np.average(effects, weights=w_fixed) Q = np.sum(w_fixed * (effects - weighted_mean_fixed) ** 2) df_effect = len(effects) - 1 if Q > df_effect: tau2 = (Q - df_effect) / (np.sum(w_fixed) - np.sum(w_fixed ** 2) / np.sum(w_fixed)) else: tau2 = 0.0 w_random = 1.0 / (var + tau2) mean_random = np.average(effects, weights=w_random) se_random = np.sqrt(1.0 / np.sum(w_random)) ci_low = mean_random - 1.96 * se_random ci_high = mean_random + 1.96 * se_random I2_percent = max(0.0, (Q - df_effect) / Q) * 100 if Q > 0 else 0.0 Q_p = chi2.sf(Q, df_effect) Q_text = f\"{Q_p:.3f}\" if Q_p >= 0.001 else \"<0.001\" # ----------------- 绘图样式配置 ----------------- def configure_matplotlib(): plt.rcParams.update({ \"font.family\": \"serif\", \"font.serif\": [\"Times New Roman\"], \"mathtext.fontset\": \"custom\", \"mathtext.rm\": \"Times New Roman\", \"mathtext.it\": \"Times New Roman:italic\", \"mathtext.bf\": \"Times New Roman:bold\", \"axes.unicode_minus\": False, \"pdf.fonttype\": 42, \"ps.fonttype\": 42, \"svg.fonttype\": \"none\", }) def style_full_box(ax): for spine in ax.spines.values(): spine.set_visible(True) spine.set_linewidth(0.95) spine.set_color(\"black\") ax.grid(False) ax.tick_params(axis=\"both\", direction=\"out\", width=0.85, length=3.8, colors=\"black\") configure_matplotlib() fig = plt.figure(figsize=(8.2, 8.8), dpi=600) ax = fig.add_axes([0.16, 0.13, 0.79, 0.79]) fig.patch.set_facecolor(\"white\") ax.set_facecolor(\"white\") # 置信区间线段 xerr_low = df[\"LNRR\"] - df[\"LNRR_CI_low\"] xerr_high = df[\"LNRR_CI_high\"] - df[\"LNRR\"] ax.errorbar( df[\"LNRR\"], df[\"y\"], xerr=[xerr_low, xerr_high], fmt=\"none\", ecolor=CI_COLOR, elinewidth=1.25, capsize=0, zorder=1, ) # 效应量散点 ax.scatter( df[\"LNRR\"], df[\"y\"], s=df[\"PointSize\"], c=df[\"Color\"], edgecolor=\"white\", linewidth=0.55, zorder=3, ) # 零线 ax.axvline(0, color=ZERO_COLOR, linestyle=(0, (4, 3)), linewidth=1.1, zorder=0) # 轴刻度和标签 ax.set_yticks(df[\"y\"]) ax.set_yticklabels(df[\"Site\"], fontsize=8.4, fontweight=\"bold\") ax.invert_yaxis() ax.set_xlim(-1.9, 3.25) ax.set_xticks([-1, 0, 1, 2, 3]) ax.tick_params(axis=\"x\", labelsize=10.5) ax.set_xlabel(\"LnRR = ln(DTR / DCK), 3 d cumulative\", fontsize=12, fontweight=\"bold\", labelpad=8) ax.set_ylabel(\"Soils sorted by LnRR\", fontsize=12, fontweight=\"bold\", labelpad=14) ax.set_title(\"Variance-aware LnRR forest plot\", loc=\"left\", fontsize=15, fontweight=\"bold\", pad=10) style_full_box(ax) # 统计信息文本 summary_text = ( f\"Random mean = {mean_random:.3f} \" f\"[{ci_low:.3f}, {ci_high:.3f}]\\n\" f\"I$^2$ = {I2_percent:.1f}%, \" f\"tau$^2$ = {tau2:.3f}, Q p {Q_text}\\n\" \"SE: temporal LnRR proxy\" ) ax.text( 0.975, 0.965, summary_text, transform=ax.transAxes, ha=\"right\", va=\"top\", fontsize=10, fontweight=\"normal\", color=\"black\", ) # 平台通过 plt.gcf() 获取当前 figure，无需 savefig/show # Spec-level overrides applied in SciFigure fig = plt.gcf() fig.set_size_inches(3.3465, 2.7559, forward=True) fig.set_dpi(600) for ax in fig.axes: ax.set_title(\"Relative abundance of ARGs\", fontsize=16, fontweight=\"bold\") ax.set_xlabel(\"Sample\", fontsize=16) ax.set_ylabel(\"Relative abundance (%)\", fontsize=16) ax.tick_params(labelsize=11, width=1) visibility = { \"top\": True, \"bottom\": True, \"left\": True, \"right\": True, } for side, spine in ax.spines.items(): spine.set_linewidth(1) spine.set_visible(visibility.get(side, True)) ax.legend(loc=\"upper right\", frameon=False, fontsize=10) plt.tight_layout()"
