e\": 26.278453880514224 }, { \"ID\": 16, \"Site\": \"AY\", \"样本名\": \"mean.AY\", \"LNRR\": 0.7499491251907943, \"LNRR_SE_proxy\": 0.562526532662737, \"LNRR_CI_low\": -0.3526028788281702, \"LNRR_CI_high\": 1.852501129209759, \"Weight_proxy\": 3.160195692461752, \"CI_class\": \"CI-crosses-zero\", \"Response_Group\": \"Promoted\", \"y\": 35, \"Color\": \"#1F78B4\", \"PointSize\": 24.944668918254003 }, { \"ID\": 27, \"Site\": \"SH1\", \"样本名\": \"mean.SH1\", \"LNRR\": 0.8320293321051008, \"LNRR_SE_proxy\": 0.6092950627549796, \"LNRR_CI_low\": -0.3621889908946593, \"LNRR_CI_high\": 2.026247655104861, \"Weight_proxy\": 2.693671814871445, \"CI_class\": \"CI-crosses-zero\", \"Response_Group\": \"Promoted\", \"y\": 36, \"Color\": \"#1F78B4\", \"PointSize\": 24.747474707552108 }, { \"ID\": 39, \"Site\": \"NJ\", \"样本名\": \"mean.NJ\", \"LNRR\": 0.9280647745066047, \"LNRR_SE_proxy\": 0.3918443388066054, \"LNRR_CI_low\": 0.1600498704456581, \"LNRR_CI_high\": 1.696079678567551, \"Weight_proxy\": 6.51287655576998, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 37, \"Color\": \"#1F78B4\", \"PointSize\": 26.36180807946968 }, { \"ID\": 3, \"Site\": \"SQ\", \"样本名\": \"mean.SQ\", \"LNRR\": 1.080996272963314, \"LNRR_SE_proxy\": 0.4061425532319884, \"LNRR_CI_low\": 0.2849568686286167, \"LNRR_CI_high\": 1.877035677298011, \"Weight_proxy\": 6.062377981782364, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 38, \"Color\": \"#1F78B4\", \"PointSize\": 26.171387577996803 }, { \"ID\": 37, \"Site\": \"XC\", \"样本名\": \"mean.XC\", \"LNRR\": 1.249903840618026, \"LNRR_SE_proxy\": 0.9195092156458025, \"LNRR_CI_low\": -0.5523342220477467, \"LNRR_CI_high\": 3.052141903283799, \"Weight_proxy\": 1.182736031261238, \"CI_class\": \"CI-crosses-zero\", \"Response_Group\": \"Promoted\", \"y\": 39, \"Color\": \"#1F78B4\", \"PointSize\": 24.108819745646993 }, { \"ID\": 21, \"Site\": \"YC2\", \"样本名\": \"mean.YC2\", \"LNRR\": 1.465845426698962, \"LNRR_SE_proxy\": 0.1918626652677393, \"LNRR_CI_low\": 1.089794602774193, \"LNRR_CI_high\": 1.841896250623731, \"Weight_proxy\": 27.16558448597672, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 40, \"Color\": \"#1F78B4\", \"PointSize\": 35.09146723473023 }, { \"ID\": 25, \"Site\": \"SY\", \"样本名\": \"mean.SY\", \"LNRR\": 1.769516855120657, \"LNRR_SE_proxy\": 0.486313671595109, \"LNRR_CI_low\": 0.8163420587942435, \"LNRR_CI_high\": 2.722691651447071, \"Weight_proxy\": 4.228312160226079, \"CI_class\": \"CI-positive\", \"Response_Group\": \"Promoted\", \"y\": 41, \"Color\": \"#1F78B4\", \"PointSize\": 25.396149311682976 } ] }, \"export\": { \"format\": \"PDF\", \"dpi\": 600 }, \"custom_script\": \"import matplotlib\\nmatplotlib.use(\\\"Agg\\\")\\nimport matplotlib.pyplot as plt\\nimport numpy as np\\nimport pandas as pd\\nfrom scipy.stats import chi2\\n\\n# 常量\\nPROMOTION = \\\"#1F78B4\\\"\\nINHIBITION = \\\"#D62728\\\"\\nCI_COLOR = \\\"#8F8B85\\\"\\nZERO_COLOR = \\\"#333333\\\"\\n\\n# 加载数据\\ndf = pd.DataFrame(_uploaded_data)\\n\\n# 确保数值列正确\\nnum_cols = [\\\"LNRR\\\", \\\"LNRR_CI_low\\\", \\\"LNRR_CI_high\\\", \\\"LNRR_SE_proxy\\\", \\\"Weight_proxy\\\"]\\nfor col in num_cols:\\n df[col] = pd.to_numeric(df[col], errors=\\\"coerce\\\")\\ndf = df.dropna(subset=[\\\"Site\\\"] + num_cols).copy()\\n\\n# 按 LnRR 排序并重新编号 y\\ndf = df.sort_values(\\\"LNRR\\\", ascending=True).reset_index(drop=True)\\ndf[\\\"y\\\"] = np.arange(len(df))\\n\\n# 颜色（根据 LNRR 符号）\\ndf[\\\"Color\\\"] = np.where(df[\\\"LNRR\\\"] >= 0, PROMOTION, INHIBITION)\\n\\n# 点大小（基于 Weight_proxy 重新计算）\\nweight = df[\\\"Weight_proxy\\\"].fillna(df[\\\"Weight_proxy\\\"].median())\\nmin_w, max_w = weight.min(), weight.max()\\nif max_w - min_w > 1e-12:\\n df[\\\"PointSize\\\"] = 24 + 82 * (weight - min_w) / (max_w - min_w)\\nelse:\\n df[\\\"PointSize\\\"] = 48\\n\\n# ----------------- 异质性指标（随机效应 DL 法） -----------------\\neffects = df[\\\"LNRR\\\"].values\\nse = df[\\\"LNRR_SE_proxy\\\"].values\\nvar = se ** 2\\n\\nw_fixed = 1.0 / var\\nweighted_mean_fixed = np.average(effects, weights=w_fixed)\\nQ = np.sum(w_fixed * (effects - weighted_mean_fixed) ** 2)\\ndf_effect = len(effects) - 1\\n\\nif Q > df_effect:\\n tau2 = (Q - df_effect) / (np.sum(w_fixed) - np.sum(w_fixed ** 2) / np.sum(w_fixed))\\nelse:\\n tau2 = 0.0\\n\\nw_random = 1.0 / (var + tau2)\\nmean_random = np.average(effects, weights=w_random)\\nse_random = np.sqrt(1.0 / np.sum(w_random))\\nci_low = mean_random - 1.96 * se_random\\nci_high = mean_random + 1.96 * se_random\\n\\nI2_percent = max(0.0, (Q - df_effect) / Q) * 100 if Q > 0 else 0.0\\nQ_p = chi2.sf(Q, df_effect)\\nQ_text = f\\\"{Q_p:.3f}\\\" if Q_p >= 0.001 else \\\"<0.001\\\"\\n\\n# ----------------- 绘图样式配置 -----------------\\ndef configure_matplotlib():\\n plt.rcParams.update({\\n \\\"font.family\\\": \\\"serif\\\",\\n \\\"font.serif\\\": [\\\"Times New Roman\\\"],\\n \\\"mathtext.fontset\\\": \\\"custom\\\",\\n \\\"mathtext.rm\\\": \\\"Times New Roman\\\",\\n \\\"mathtext.it\\\": \\\"Times New Roman:italic\\\",\\n \\\"mathtext.bf\\\": \\\"Times New Roman:bold\\\",\\n \\\"axes.unicode_minus\\\": False,\\n \\\"pdf.fonttype\\\": 42,\\n \\\"ps.fonttype\\\": 42,\\n \\\"svg.fonttype\\\": \\\"none\\\",\\n })\\n\\ndef style_full_box(ax):\\n for spine in ax.spines.values():\\n spine.set_visible(True)\\n spine.set_linewidth(0.95)\\n spine.set_color(\\\"black\\\")\\n ax.grid(False)\\n ax.tick_params(axis=\\\"both\\\", direction=\\\"out\\\", width=0.85, length=3.8, colors=\\\"black\\\")\\n\\nconfigure_matplotlib()\\n\\nfig = plt.figure(figsize=(8.2, 8.8), dpi=600)\\nax = fig.add_axes([0.16, 0.13, 0.79, 0.79])\\nfig.patch.set_facecolor(\\\"white\\\")\\nax.set_facecolor(\\\"white\\\")\\n\\n# 置信区间线段\\nxerr_low = df[\\\"LNRR\\\"] - df[\\\"LNRR_CI_low\\\"]\\nxerr_high = df[\\\"LNRR_CI_high\\\"] - df[\\\"LNRR\\\"]\\nax.errorbar(\\n df[\\\"LNRR\\\"], df[\\\"y\\\"],\\n xerr=[xerr_low, xerr_high],\\n fmt=\\\"none\\\",\\n ecolor=CI_COLOR,\\n elinewidth=1.25,\\n capsize=0,\\n zorder=1,\\n)\\n\\n# 效应量散点\\nax.scatter(\\n df[\\\"LNRR\\\"], df[\\\"y\\\"],\\n s=df[\\\"PointSize\\\"],\\n c=df[\\\"Color\\\"],\\n edgecolor=\\\"white\\\",\\n linewidth=0.55,\\n zorder=3,\\n)\\n\\n# 零线\\nax.axvline(0, color=ZERO_COLOR, linestyle=(0, (4, 3)), linewidth=1.1, zorder=0)\\n\\n# 轴刻度和标签\\nax.set_yticks(df[\\\"y\\\"])\\nax.set_yticklabels(df[\\\"Site\\\"], fontsize=8.4, fontweight=\\\"bold\\\")\\nax.invert_yaxis()\\nax.set_xlim(-1.9, 3.25)\\nax.set_xticks([-1, 0, 1, 2, 3])\\nax.tick_params(axis=\\\"x\\\", labelsize=10.5)\\n\\nax.set_xlabel(\\\"LnRR = ln(DTR / DCK), 3 d cumulative\\\", fontsize=12, fontweight=\\\"bold\\\", labelpad=8)\\nax.set_ylabel(\\\"Soils sorted by LnRR\\\", fontsize=12, fontweight=\\\"bold\\\", labelpad=14)\\nax.set_title(\\\"Variance-aware LnRR forest plot\\\", loc=\\\"left\\\", fontsize=15, fontweight=\\\"bold\\\", pad=10)\\n\\nstyle_full_box(ax)\\n\\n# 统计信息文本\\nsummary_text = (\\n f\\\"Random mean = {mean_random:.3f} \\\"\\n f\\\"[{ci_low:.3f}, {ci_high:.3f}]\\\\n\\\"\\n f\\\"I$^2$ = {I2_percent:.1f}%, \\\"\\n f\\\"tau$^2$ = {tau2:.3f}, Q p {Q_text}\\\\n\\\"\\n \\\"SE: temporal LnRR proxy\\\"\\n)\\nax.text(\\n 0.975, 0.965,\\n summary_text,\\n transform=ax.transAxes,\\n ha=\\\"right\\\", va=\\\"top\\\",\\n fontsize=10,\\n fontweight=\\\"normal\\\",\\n color=\\\"black\\\",\\n)\\n\\n# 平台通过 plt.gcf() 获取当前 figure，无需 savefig/show\", \"source\": { \"file_name\": \"Fig1A_variance_aware_LnRR_forest_plot_data.csv\", \"file_type\": \"CSV\", \"row_count\": 42, \"column_count\": 13, \"columns\": [ \"ID\", \"Site\", \"样本名\", \"LNRR\", \"LNRR_SE_proxy\", \"LNRR_CI_low\", \"LNRR_CI_high\", \"Weight_proxy\", \"CI_class\", \"Response_Group\", \"y\", \"Color\", \"PointSize\" ], \"imported_at\": \"2026-06-23T02:33:58.730Z\" } }"
