(4, 3)), linewidth=1.0, zorder=1) ax.set_yticks(df[\"y\"]) ax.set_yticklabels(df[\"Site\"], fontsize=8.4, fontweight=\"bold\") ax.invert_yaxis() xmin = float(df[\"LNRR\"].min()) xmax = float(df[\"LNRR\"].max()) span = xmax - xmin ax.set_xlim(xmin - 0.12 * span, xmax + 0.23 * span) ax.set_ylim(total_n - 0.15, -0.85) ax.set_xticks([-1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0]) ax.tick_params(axis=\"x\", labelsize=10.5) ax.set_xlabel(\"LnRR = ln(DTR / DCK)\", fontsize=12, fontweight=\"bold\", labelpad=7) ax.set_ylabel(\"Site code\", fontsize=12, fontweight=\"bold\", labelpad=20) ax.set_title( \"Ferrihydrite-induced N$_2$O response ranked by site code\", fontsize=15, fontweight=\"bold\", pad=11, ) style_full_box(ax) handles = [ plt.Line2D( [0], [0], color=BLUE, marker=\"o\", markersize=6, linewidth=1.9, label=\"Promoted: LnRR > 0\" ), plt.Line2D( [0], [0], color=RED, marker=\"o\", markersize=6, linewidth=1.9, label=\"Suppressed/non-promoted: LnRR <= 0\", ), ] ax.legend( handles=handles, loc=\"upper right\", bbox_to_anchor=(0.985, 0.992), frameon=False, fontsize=10, handlelength=1.8, ) x_stat = xmax + 0.17 * span y_stat = total_n - 4.8 ax.text( x_stat, y_stat, f\"LnRR > 0: {promoted_n}\\nLnRR <= 0: {non_promoted_n}\\nn = {total_n}\", ha=\"right\", va=\"bottom\", fontsize=10, fontweight=\"bold\", zorder=4, ) plt.show() if __name__ == \"__main__\": df = pd.DataFrame(_uploaded_data) draw_ranked_response(df)"
