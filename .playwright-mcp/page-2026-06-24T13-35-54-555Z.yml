              - generic [ref=e2498]: "from __future__ import annotations import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt import numpy as np import pandas as pd CK_FACE = \"#FF4A3A\" CK_EDGE = \"#FF0000\" TR_FACE = \"#2EA8FF\" TR_EDGE = \"#0057FF\" def configure_matplotlib() -> None: plt.rcParams.update( { \"font.family\": \"serif\", \"font.serif\": [\"Times New Roman\"], \"mathtext.fontset\": \"custom\", \"mathtext.rm\": \"Times New Roman\", \"mathtext.it\": \"Times New Roman:italic\", \"mathtext.bf\": \"Times New Roman:bold\", \"axes.unicode_minus\": False, \"pdf.fonttype\": 42, \"ps.fonttype\": 42, } ) def style_full_box(ax: plt.Axes) -> None: for spine in ax.spines.values(): spine.set_visible(True) spine.set_linewidth(0.95) spine.set_color(\"black\") ax.grid(False) ax.tick_params(axis=\"both\", direction=\"out\", width=0.85, length=4.0, colors=\"black\") def load_plot_data() -> pd.DataFrame: df = pd.DataFrame(_uploaded_data) df.columns = [str(column).strip() for column in df.columns] rate_col = \"N2O排放速率(mg N/kg/d)\" needed = [rate_col, \"时间\", \"处理\"] missing = [column for column in needed if column not in df.columns] if missing: raise KeyError(f\"Missing columns: {missing}. Available columns: {list(df.columns)}\") df = df[needed + [column for column in [\"ID\", \"样本代码\"] if column in df.columns]].copy() df[\"rate\"] = pd.to_numeric(df[rate_col], errors=\"coerce\") df = df.dropna(subset=[\"rate\", \"时间\", \"处理\"]).copy() df[\"时间\"] = df[\"时间\"].astype(str).str.strip() df[\"处理\"] = df[\"处理\"].astype(str).str.strip() df[\"log10_rate_plus_1e4\"] = np.log10(df[\"rate\"] + 1e-4) df[\"时间\"] = pd.Categorical(df[\"时间\"], categories=[\"24 h\", \"48 h\", \"72 h\"], ordered=True) df[\"处理\"] = pd.Categorical(df[\"处理\"], categories=[\"CK\", \"TR\"], ordered=True) return df.sort_values([\"时间\", \"处理\"]).reset_index(drop=True) def draw_boxplot(df: pd.DataFrame) -> None: configure_matplotlib() rng = np.random.default_rng(20260616) times = [\"24 h\", \"