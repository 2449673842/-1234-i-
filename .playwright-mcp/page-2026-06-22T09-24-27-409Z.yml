              - generic [ref=e518]: "import matplotlib.pyplot as plt import numpy as np import pandas as pd # Reproduced from SciFigure spec export _uploaded_data = [ { \"Site\": \"S1\", \"LNRR\": -0.7 }, { \"Site\": \"S2\", \"LNRR\": -0.2 }, { \"Site\": \"S3\", \"LNRR\": 0.4 }, { \"Site\": \"S4\", \"LNRR\": 1.1 } ] from __future__ import annotations import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt import numpy as np import pandas as pd BLUE = \"#1F78B4\" RED = \"#D62728\" ZERO = \"#333333\" def draw_ranked_response(df: pd.DataFrame) -> None: df = df.sort_values(\"LNRR\", ascending=True).reset_index(drop=True) df[\"y\"] = np.arange(len(df)) fig = plt.figure(figsize=(8.2, 7.2), dpi=600) ax = fig.add_axes([0.14, 0.11, 0.815, 0.805]) for _, row in df.iterrows(): x = float(row[\"LNRR\"]) y = float(row[\"y\"]) color = BLUE if x > 0 else RED ax.hlines(y, 0, x, color=color, linewidth=1.9, zorder=2) ax.scatter(x, y, s=34, color=color, edgecolor=\"white\", linewidth=0.6, zorder=3) ax.axvline(0, color=ZERO, linestyle=(0, (4, 3)), linewidth=1.0, zorder=1) ax.set_yticks(df[\"y\"]) ax.set_yticklabels(df[\"Site\"], fontsize=8.4, fontweight=\"bold\") ax.invert_yaxis() ax.set_xlabel(\"LnRR = ln(DTR / DCK)\", fontsize=12, fontweight=\"bold\", labelpad=7) ax.set_ylabel(\"Site code\", fontsize=12, fontweight=\"bold\", labelpad=20) ax.set_title(\"Ferrihydrite-induced N$_2$O response ranked by site code\", fontsize=15, fontweight=\"bold\", pad=11) plt.show() if __name__ == \"__main__\": df = pd.DataFrame(_uploaded_data) draw_ranked_response(df) # Spec-level overrides applied in SciFigure fig = plt.gcf() fig.set_size_inches(4.7244, 3.9370, forward=True) fig.set_dpi(600) for ax in fig.axes: ax.set_title(\"Ferrihydrite-induced N$_2$O response ranked by site code\", fontsize=16, fontweight=\"bold\") ax.set_xlabel(\"LnRR = ln(DTR / DCK)\", fontsize=16) ax.set_ylabel(\"Site code\", fontsize=16) ax.tick_params(labelsize=10, width=1) visibility = { \"top\": true, \"bottom\": true, \"left\": true, \"right\": true, } for side, spine in ax.spines.items(): spine.set_linewidth(1) spine.set_visible(visibility.get(side, True)) ax.legend(loc=\"upper right\", frameon=False, fontsize=10) plt.tight_layout() plt.savefig(\"figure.svg\", format=\"svg\", bbox_inches=\"tight\") plt.show()"
