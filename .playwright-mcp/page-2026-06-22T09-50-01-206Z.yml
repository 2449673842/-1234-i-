              - generic [ref=e760]: "import matplotlib.pyplot as plt import numpy as np import pandas as pd items = [ { \"label\": \"S1\", \"value\": -0.8, \"group\": \"Suppressed\" }, { \"label\": \"S2\", \"value\": -0.3, \"group\": \"Suppressed\" }, { \"label\": \"S3\", \"value\": 0.2, \"group\": \"Promoted\" }, { \"label\": \"S4\", \"value\": 0.7, \"group\": \"Promoted\" }, { \"label\": \"S5\", \"value\": 1.4, \"group\": \"Promoted\" } ] df = pd.DataFrame(items).sort_values(\"value\", ascending=True).reset_index(drop=True) df[\"y\"] = np.arange(len(df)) fig, ax = plt.subplots(figsize=(3.3465, 2.7559), dpi=600) promoted_color = \"#1F78B4\" suppressed_color = \"#D62728\" for _, row in df.iterrows(): color = promoted_color if row[\"value\"] > 0 else suppressed_color ax.hlines(row[\"y\"], 0, row[\"value\"], color=color, linewidth=1.9, zorder=2) ax.scatter(row[\"value\"], row[\"y\"], s=34, color=color, edgecolor=\"white\", linewidth=0.6, zorder=3) ax.axvline(0, color=\"#333333\", linestyle=(0, (4, 3)), linewidth=1.0, zorder=1) ax.set_yticks(df[\"y\"]) ax.set_yticklabels(df[\"label\"], fontsize=11) ax.invert_yaxis() ax.set_title(\"LNRR ranked response\", fontsize=16, fontweight=\"bold\") ax.set_xlabel(\"LNRR\", fontsize=16) ax.set_ylabel(\"Site\", fontsize=16) ax.tick_params(direction=\"out\", labelsize=11, width=1) ax.spines[\"top\"].set_visible(true) ax.spines[\"bottom\"].set_visible(true) ax.spines[\"left\"].set_visible(true) ax.spines[\"right\"].set_visible(true) for spine in ax.spines.values(): spine.set_linewidth(1) legend_handles = [ plt.Line2D([0], [0], color=promoted_color, marker=\"o\", markersize=6, linewidth=1.9, label=\"Promoted\"), plt.Line2D([0], [0], color=suppressed_color, marker=\"o\", markersize=6, linewidth=1.9, label=\"Suppressed\"), ] ax.legend(handles=legend_handles, loc=\"upper right\", frameon=False, fontsize=10) plt.tight_layout() plt.savefig(\"figure.svg\", format=\"svg\", bbox_inches=\"tight\") plt.show()"
