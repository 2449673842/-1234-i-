              - textbox [ref=e247]: "## SciFigure 平台 — 自定义脚本改写指南 ### 平台渲染后端约定（必须遵守） 你正在帮助用户改写 Matplotlib 脚本，使其运行在 SciFigure 的 **Python matplotlib 后端** 上。以下是平台的代码执行环境： **环境信息：** - Python 3.x，预装 matplotlib、numpy、pandas、scipy - 中文字体已配置（Microsoft YaHei, SimHei, Noto Sans SC 等） - 后端调用 exec() 执行用户脚本，并自动捕获 SVG 输出 **数据传递方式：** - 上传的 CSV/Excel 数据已解析为 `_uploaded_data` 变量，类型为 **list[dict]**（每行一个 dict，key 为列名） - 请使用 `df = pd.DataFrame(_uploaded_data)` 加载数据，**不要用 pd.read_csv()、pd.read_excel() 等文件读取函数** **输出捕获（重要）：** - 平台已全局 patch `plt.savefig()` 和 `plt.show()`，它们会自动将当前图形写入 SVG 缓冲区 - **脚本中直接调用 `plt.show()` 即可触发 SVG 捕获**，无需传文件名 - 也可以调用 `plt.savefig()`（不传参数），平台同样会拦截 - 不要在脚本末尾写 `plt.savefig(\"output.svg\")` — 文件名参数会被忽略，平台自动捕获 **不允许的操作：** - ✗ 不要读写本地文件（open()、pd.read_csv() 等） - ✗ 不要调用 sys.exit() - ✗ 不要 import 未预装的第三方包 **输出格式：** - 只返回纯 Python 代码，**不要用 ``` 包裹** - 不要添加额外说明文字 ### 本次任务 现有一个数据集，列名为：[\"Site\",\"LNRR\"] 用户提供了一个读取本地文件的原始脚本（见下方）。请改写它来使用 `_uploaded_data` 变量，调整列名引用以匹配上述列名，保留原始脚本的绘图意图（颜色、标题、统计逻辑等）。 用户原始脚本: from __future__ import annotations import matplotlib matplotlib.use(\"Agg\") import matplotlib.pyplot as plt import numpy as np import pandas as pd BLUE = \"#1F78B4\" RED = \"#D62728\" ZERO = \"#333333\" def configure_matplotlib() -> None: plt.rcParams.update( { \"font.family\": \"serif\", \"font.serif\": [\"Times New Roman\"], \"mathtext.fontset\": \"custom\", \"mathtext.rm\": \"Times New Roman\", \"mathtext.it\": \"Times New Roman:italic\", \"mathtext.bf\": \"Times New Roman:bold\", \"axes.unicode_minus\": False, \"pdf.fonttype\": 42, \"ps.fonttype\": 42, } ) def style_full_box(ax: plt.Axes) -> None: for spine in ax.spines.values(): spine.set_visible(True) spine.set_linewidth(0.9) spine.set_color(\"black\") ax.grid(False) ax.tick_params(axis=\"both\", direction=\"out\", width=0.8, length=3.5, colors=\"black\") def draw_ranked_response(df: pd.DataFrame) -> None: configure_matplotlib() # Sort by LNRR ascending and recompute y, Group, Color df = df.sort_values(\"LNRR\", ascending=True).reset_index(drop=True) df[\"y\"] = np.arange(len(df)) df[\"Group\"] = np.where(df[\"LNRR\"] > 0, \"Promoted\", \"Suppressed/non-promoted\") df[\"Color\"] = np.where(df[\"LNRR\"] > 0, BLUE, RED) promoted_n = int((df[\"LNRR\"] > 0).sum()) non_promoted_n = int((df[\"LNRR\"] <= 0).sum()) total_n = len(df) fig = plt.figure(figsize=(8.2, 7.2), dpi=600) ax = fig.add_axes([0.14, 0.11, 0.815, 0.805]) fig.patch.set_facecolor(\"white\") ax.set_facecolor(\"white\") for _, row in df.iterrows(): x = float(row[\"LNRR\"]) y = float(row[\"y\"]) color = row[\"Color\"] ax.hlines(y, 0, x, color=color, linewidth=1.9, zorder=2) ax.scatter(x, y, s=34, color=color, edgecolor=\"white\", linewidth=0.6, zorder=3) ax.axvline(0, color=ZERO, linestyle=(0, (4, 3)), linewidth=1.0, zorder=1) ax.set_yticks(df[\"y\"]) ax.set_yticklabels(df[\"Site\"], fontsize=8.4, fontweight=\"bold\") ax.invert_yaxis() xmin = float(df[\"LNRR\"].min()) xmax = float(df[\"LNRR\"].max()) span = xmax - xmin ax.set_xlim(xmin - 0.12 * span, xmax + 0.23 * span) ax.set_ylim(total_n - 0.15, -0.85) ax.set_xticks([-1.0, -0.5, 0.0, 0.5, 1.0, 1.5, 2.0]) ax.tick_params(axis=\"x\", labelsize=10.5) ax.set_xlabel(\"LnRR = ln(DTR / DCK)\", fontsize=12, fontweight=\"bold\", labelpad=7) ax.set_ylabel(\"Site code\", fontsize=12, fontweight=\"bold\", labelpad=20) ax.set_title( \"Ferrihydrite-induced N$_2$O response ranked by site code\", fontsize=15, fontweight=\"bold\", pad=11, ) style_full_box(ax) handles = [ plt.Line2D( [0], [0], color=BLUE, marker=\"o\", markersize=6, linewidth=1.9, label=\"Promoted: LnRR > 0\" ), plt.Line2D( [0], [0], color=RED, marker=\"o\", markersize=6, linewidth=1.9, label=\"Suppressed/non-promoted: LnRR <= 0\", ), ] ax.legend( handles=handles, loc=\"upper right\", bbox_to_anchor=(0.985, 0.992), frameon=False, fontsize=10, handlelength=1.8, ) x_stat = xmax + 0.17 * span y_stat = total_n - 4.8 ax.text( x_stat, y_stat, f\"LnRR > 0: {promoted_n}\\nLnRR <= 0: {non_promoted_n}\\nn = {total_n}\", ha=\"right\", va=\"bottom\", fontsize=10, fontweight=\"bold\", zorder=4, ) plt.show() if __name__ == \"__main__\": df = pd.DataFrame(_uploaded_data) draw_ranked_response(df)"
